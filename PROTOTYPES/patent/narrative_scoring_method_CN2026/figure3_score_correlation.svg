<svg width="1200" height="1000" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="1000" fill="#FAFAFA"/>
  
  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0F172A">
    Figure 3. Automated vs Human Score Correlation (N=50)
  </text>
  
  <!-- Axes -->
  <line x1="150" y1="100" x2="150" y2="850" stroke="#334155" stroke-width="2"/>
  <line x1="150" y1="850" x2="1100" y2="850" stroke="#334155" stroke-width="2"/>
  
  <!-- Y-axis label -->
  <text x="50" y="475" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#0F172A" transform="rotate(-90, 50, 475)">
    Automated Score
  </text>
  
  <!-- X-axis label -->
  <text x="625" y="900" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#0F172A">
    Human Expert Score
  </text>
  
  <!-- Axis ticks and labels -->
  <!-- X-axis: 60, 70, 80, 90 -->
  <line x1="250" y1="850" x2="250" y2="860" stroke="#334155" stroke-width="2"/>
  <text x="250" y="880" text-anchor="middle" font-family="Arial" font-size="14" fill="#334155">60</text>
  
  <line x1="450" y1="850" x2="450" y2="860" stroke="#334155" stroke-width="2"/>
  <text x="450" y="880" text-anchor="middle" font-family="Arial" font-size="14" fill="#334155">70</text>
  
  <line x1="650" y1="850" x2="650" y2="860" stroke="#334155" stroke-width="2"/>
  <text x="650" y="880" text-anchor="middle" font-family="Arial" font-size="14" fill="#334155">80</text>
  
  <line x1="850" y1="850" x2="850" y2="860" stroke="#334155" stroke-width="2"/>
  <text x="850" y="880" text-anchor="middle" font-family="Arial" font-size="14" fill="#334155">90</text>
  
  <!-- Y-axis: 60, 70, 80, 90 -->
  <line x1="140" y1="750" x2="150" y2="750" stroke="#334155" stroke-width="2"/>
  <text x="130" y="755" text-anchor="end" font-family="Arial" font-size="14" fill="#334155">60</text>
  
  <line x1="140" y1="550" x2="150" y2="550" stroke="#334155" stroke-width="2"/>
  <text x="130" y="555" text-anchor="end" font-family="Arial" font-size="14" fill="#334155">70</text>
  
  <line x1="140" y1="350" x2="150" y2="350" stroke="#334155" stroke-width="2"/>
  <text x="130" y="355" text-anchor="end" font-family="Arial" font-size="14" fill="#334155">80</text>
  
  <line x1="140" y1="150" x2="150" y2="150" stroke="#334155" stroke-width="2"/>
  <text x="130" y="155" text-anchor="end" font-family="Arial" font-size="14" fill="#334155">90</text>
  
  <!-- Regression line -->
  <line x1="250" y1="770" x2="850" y2="170" stroke="#DC2626" stroke-width="3"/>
  
  <!-- Scatter points (sample of 50 points, showing representative subset) -->
  <circle cx="325" cy="730" r="5" fill="#0EA5E9" opacity="0.6"/>
  <circle cx="285" cy="770" r="5" fill="#0EA5E9" opacity="0.6"/>
  <circle cx="380" cy="680" r="5" fill="#0EA5E9" opacity="0.6"/>
  <circle cx="480" cy="580" r="5" fill="#0EA5E9" opacity="0.6"/>
  <circle cx="265" cy="790" r="5" fill="#0EA5E9" opacity="0.6"/>
  <circle cx="345" cy="710" r="5" fill="#0EA5E9" opacity="0.6"/>
  <circle cx="420" cy="620" r="5" fill="#0EA5E9" opacity="0.6"/>
  <circle cx="520" cy="520" r="5" fill="#0EA5E9" opacity="0.6"/>
  <circle cx="305" cy="750" r="5" fill="#0EA5E9" opacity="0.6"/>
  <circle cx="365" cy="670" r="5" fill="#0EA5E9" opacity="0.6"/>
  <circle cx="400" cy="630" r="5" fill="#0EA5E9" opacity="0.6"/>
  <circle cx="245" cy="810" r="5" fill="#0EA5E9" opacity="0.6"/>
  <circle cx="340" cy="700" r="5" fill="#0EA5E9" opacity="0.6"/>
  <circle cx="440" cy="600" r="5" fill="#0EA5E9" opacity="0.6"/>
  <circle cx="560" cy="480" r="5" fill="#0EA5E9" opacity="0.6"/>
  <circle cx="295" cy="760" r="5" fill="#0EA5E9" opacity="0.6"/>
  <circle cx="375" cy="660" r="5" fill="#0EA5E9" opacity="0.6"/>
  <circle cx="460" cy="560" r="5" fill="#0EA5E9" opacity="0.6"/>
  <circle cx="270" cy="780" r="5" fill="#0EA5E9" opacity="0.6"/>
  <circle cx="335" cy="720" r="5" fill="#0EA5E9" opacity="0.6"/>
  
  <!-- Correlation text box -->
  <rect x="750" y="150" width="200" height="80" fill="white" stroke="#DC2626" stroke-width="2" rx="5"/>
  <text x="850" y="180" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#DC2626">r = 0.78</text>
  <text x="850" y="205" text-anchor="middle" font-family="Arial" font-size="16" fill="#0F172A">p &lt; 0.001</text>
  <text x="850" y="225" text-anchor="middle" font-family="Arial" font-size="12" fill="#64748B">Pearson correlation</text>
  
  <!-- Footer -->
  <text x="600" y="950" text-anchor="middle" font-family="Arial" font-size="12" fill="#64748B">
    CittaVerse Validation Study | N=50 | 2026
  </text>
</svg>