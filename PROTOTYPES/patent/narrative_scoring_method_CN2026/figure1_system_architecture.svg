<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="800" fill="#FAFAFA"/>
  
  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0F172A">
    Figure 1. System Architecture of Neuro-Symbolic Narrative Assessment Pipeline
  </text>
  
  <!-- Module 1 -->
  <rect x="400" y="100" width="400" height="100" rx="10" fill="#E0F2FE" stroke="#0284C7" stroke-width="3"/>
  <text x="600" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0284C7">Module 1: Input Processing</text>
  <text x="600" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#334155">• ASR transcription (dialect-optimized)</text>
  <text x="600" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#334155">• Text preprocessing</text>
  
  <!-- Arrow 1 -->
  <line x1="600" y1="200" x2="600" y2="230" stroke="#0284C7" stroke-width="3" marker-end="url(#arrowhead)"/>
  <polygon id="arrowhead" points="600,230 595,220 605,220" fill="#0284C7"/>
  
  <!-- Module 2 -->
  <rect x="400" y="230" width="400" height="100" rx="10" fill="#E0F2FE" stroke="#0284C7" stroke-width="3"/>
  <text x="600" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0284C7">Module 2: Event Graph Extraction (Neural)</text>
  <text x="600" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#334155">• LLM prompt: "Extract events as JSON"</text>
  <text x="600" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#334155">• Output: Directed graph G = (V, E)</text>
  
  <!-- Arrow 2 -->
  <line x1="600" y1="330" x2="600" y2="360" stroke="#0284C7" stroke-width="3"/>
  <polygon points="600,360 595,350 605,350" fill="#0284C7"/>
  
  <!-- Module 3 -->
  <rect x="400" y="360" width="400" height="100" rx="10" fill="#E0F2FE" stroke="#0284C7" stroke-width="3"/>
  <text x="600" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0284C7">Module 3: Dual-Layer Scoring</text>
  <text x="600" y="415" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#334155">• Symbolic: TC, ED via NetworkX</text>
  <text x="600" y="435" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#334155">• Neural: 5-dimension scoring via LLM</text>
  
  <!-- Arrow 3 -->
  <line x1="600" y1="460" x2="600" y2="490" stroke="#0284C7" stroke-width="3"/>
  <polygon points="600,490 595,480 605,480" fill="#0284C7"/>
  
  <!-- Module 4 -->
  <rect x="400" y="490" width="400" height="100" rx="10" fill="#E0F2FE" stroke="#0284C7" stroke-width="3"/>
  <text x="600" y="520" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0284C7">Module 4: Integration &amp; Feedback</text>
  <text x="600" y="545" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#334155">• Weighted fusion → Grade (S/A/B/C)</text>
  <text x="600" y="565" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#334155">• Dynamic feedback generation</text>
  
  <!-- Footer -->
  <text x="600" y="650" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748B">
    CittaVerse Neuro-Symbolic Architecture | 2026
  </text>
</svg>