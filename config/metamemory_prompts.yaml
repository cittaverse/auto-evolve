## 三、策略提示 (Strategy Cueing)

### 目标
提示用户使用有效的记忆提取策略，如情境重建、感官细节、情感连接等

### 引导问题

#### SC-001: 情境重建
```yaml
id: SC-001
category: strategy_cueing
trigger_keywords: ["记得", "想起"]
question: "让我们闭上眼睛，一起回到那个场景。您当时在哪里？周围有什么声音？"
technique: "情境重建 (Context Reinstatement)"
follow_up:
  - "空气中有什么气味吗？"
  - "您当时身体感觉怎么样？冷还是热？"
rationale: "多感官情境重建可显著提升记忆提取效率"
expected_outcome: "用户能回忆更多感官细节，叙事更生动"
```

#### SC-002: 时间线重建
```yaml
id: SC-002
category: strategy_cueing
trigger_keywords: ["然后", "之后", "后来"]
question: "让我们按时间顺序再走一遍：那天早上您起床后做的第一件事是什么？"
technique: "时间线重建 (Temporal Reconstruction)"
follow_up:
  - "然后呢？接下来发生了什么？"
  - "这件事之前/之后还有什么相关的事？"
rationale: "时间顺序是记忆组织的关键框架"
expected_outcome: "用户能按时间顺序提取更多事件细节"
```

#### SC-003: 情感连接
```yaml
id: SC-003
category: strategy_cueing
trigger_keywords: ["感觉", "心情", "情绪"]
question: "当时这件事让您有什么感觉？开心？紧张？还是其他情绪？"
technique: "情感连接 (Emotional Connection)"
follow_up:
  - "这种情绪对身体有什么影响？比如心跳加快？"
  - "这种情绪持续了多久？"
rationale: "情感是记忆的强力锚点"
expected_outcome: "用户能回忆情感细节，增强叙事感染力"
```

#### SC-004: 人物关系网
```yaml
id: SC-004
category: strategy_cueing
trigger_keywords: ["谁", "人", "一起"]
question: "当时还有谁在场？您和他们是什么关系？"
technique: "社会网络重建 (Social Network Reconstruction)"
follow_up:
  - "他们当时在做什么？"
  - "您和他们说了什么话？"
rationale: "社会关系是自传体记忆的核心组织原则"
expected_outcome: "用户能回忆更多人际互动细节"
```

