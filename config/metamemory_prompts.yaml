# 元记忆 (Metamemory) 引导问题库
# 版本：1.0
# 创建日期：2026-03-14
# 来源：JMIR mHealth 2026-01《Efficacy and Safety of Mobile App–Based Metamemory Cognitive Training》
# 整合者：Hulk 🟢
#
# 元记忆定义：个体对自身记忆过程的认知、监控和调节能力
# 应用目标：在叙事引导问题中加入元认知提示，提升叙事细节 20-30%、记忆信心 1.5-2.0 分
#
# 四类策略：
# 1. 来源监控 (Source Monitoring) — 帮助区分记忆来源（亲身经历 vs 听说 vs 想象）
# 2. 信心评估 (Confidence Assessment) — 评估对记忆细节的信心程度
# 3. 策略提示 (Strategy Cueing) — 提示使用记忆提取策略（情境重建、感官细节等）
# 4. 意义反思 (Meaning Reflection) — 反思事件对个人身份/价值观的影响

---

## 一、来源监控 (Source Monitoring)

### 目标
帮助用户区分记忆的真实来源，减少记忆混淆，增强叙事可信度

### 引导问题

#### SM-001: 感官来源确认
```yaml
id: SM-001
category: source_monitoring
trigger_keywords: ["记得", "想起", "那时候"]
question: "您刚才描述的这件事，是您当时亲眼看到的，还是后来听别人说的？"
follow_up:
  - "如果是亲眼看到的，您当时站在什么位置？"
  - "如果是听说的，是谁告诉您的？在什么场合？"
rationale: "区分第一手经验 vs 二手信息，增强来源清晰度"
expected_outcome: "用户能明确记忆来源，减少模糊表述"
```

#### SM-002: 时间来源确认
```yaml
id: SM-002
category: source_monitoring
trigger_keywords: ["那年", "当时", "记得"]
question: "这件事发生在什么季节？您怎么确定是这个时间？"
follow_up:
  - "那天天气怎么样？"
  - "您当时穿的是什么衣服？"
rationale: "通过时间锚点验证记忆来源的可靠性"
expected_outcome: "用户能提供具体时间线索，增强记忆可信度"
```

#### SM-003: 情境来源确认
```yaml
id: SM-003
category: source_monitoring
trigger_keywords: ["地方", "地点", "在那里"]
question: "您能描述一下当时周围的环境吗？比如房间里有什么摆设？"
follow_up:
  - "房间里有什么特别的物品让您印象深刻？"
  - "当时的光线怎么样？是白天还是晚上？"
rationale: "情境细节是来源监控的关键线索"
expected_outcome: "用户能回忆环境细节，增强记忆真实感"
```

