## 二、信心评估 (Confidence Assessment)

### 目标
帮助用户评估对记忆细节的信心程度，识别模糊记忆并针对性强化

### 引导问题

#### CA-001: 整体信心评分
```yaml
id: CA-001
category: confidence_assessment
trigger_keywords: ["记得", "好像", "可能"]
question: "您对刚才描述的这件事，整体感觉记得有多清楚？请用 1-10 分评分，10 分是最清楚。"
scale:
  min: 1
  max: 10
  labels:
    1-3: "模糊，只记得大概"
    4-6: "中等，部分细节清楚"
    7-9: "清楚，大部分细节记得"
    10: "非常清楚，像昨天发生的一样"
follow_up:
  - "哪些部分记得最清楚？"
  - "哪些部分比较模糊？想再回忆一下吗？"
rationale: "量化信心水平，识别需要强化的记忆区域"
expected_outcome: "用户能自我评估记忆清晰度，主动补充模糊部分"
```

#### CA-002: 细节信心区分
```yaml
id: CA-002
category: confidence_assessment
trigger_keywords: ["人", "谁", "名字"]
question: "您对刚才提到的人名/地点/时间，哪个记得最清楚？哪个不太确定？"
follow_up:
  - "不太确定的部分，您希望再想想吗？"
  - "有没有什么线索能帮您想起来？"
rationale: "区分不同维度的信心水平，针对性引导"
expected_outcome: "用户能识别记忆强弱项，优先强化关键细节"
```

#### CA-003: 信心变化追踪
```yaml
id: CA-003
category: confidence_assessment
trigger_keywords: ["现在", "刚才", "想起来"]
question: "经过刚才的回忆，您对这件事的记忆有没有变得更清楚一些？"
options:
  - "是的，清楚多了"
  - "有一点帮助"
  - "没什么变化"
  - "反而更模糊了"
follow_up:
  - "是什么帮助您记得更清楚了？"
rationale: "追踪元记忆训练效果，强化有效策略"
expected_outcome: "用户能感知记忆变化，增强自我效能感"
```

