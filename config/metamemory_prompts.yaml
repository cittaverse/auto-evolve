## 四、意义反思 (Meaning Reflection)

### 目标
帮助用户反思事件对个人身份、价值观、人生轨迹的影响，提升叙事连贯性

### 引导问题

#### MR-001: 个人意义
```yaml
id: MR-001
category: meaning_reflection
trigger_keywords: ["那件事", "经历", "事情"]
question: "这件事对您来说意味着什么？它对您后来的人生有什么影响？"
follow_up:
  - "如果没有这件事，您的人生会有什么不同？"
  - "这件事教会了您什么？"
rationale: "意义反思提升叙事连贯性和自我认同感"
expected_outcome: "用户能连接事件与人生主题，增强叙事深度"
```

#### MR-002: 价值观连接
```yaml
id: MR-002
category: meaning_reflection
trigger_keywords: ["重要", "意义", "为什么"]
question: "这件事反映了您什么样的价值观或信念？"
follow_up:
  - "这个价值观对您后来的人生选择有什么影响？"
  - "您现在还会坚持这个价值观吗？"
rationale: "价值观是自我认同的核心"
expected_outcome: "用户能识别事件背后的价值观，增强自我理解"
```

#### MR-003: 身份转变
```yaml
id: MR-003
category: meaning_reflection
trigger_keywords: ["之后", "后来", "从那以后"]
question: "这件事之后，您觉得自己有什么变化吗？比如看待世界的方式？"
follow_up:
  - "这件事前后的您，有什么不一样？"
  - "这个变化对您来说是好的还是不好的？"
rationale: "身份转变是生命故事的核心主题"
expected_outcome: "用户能识别个人成长轨迹，增强生命连贯感"
```

#### MR-004: 传承意义
```yaml
id: MR-004
category: meaning_reflection
trigger_keywords: ["孩子", "后代", "希望"]
question: "您希望您的孩子或孙辈从这件事中学到什么？"
follow_up:
  - "您会怎么把这件事讲给他们听？"
  - "这件事对家族有什么特殊意义？"
rationale: "传承意义增强生命故事的代际价值"
expected_outcome: "用户能连接个人经历与家族传承，增强生命意义感"
```

