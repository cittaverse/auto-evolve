## 使用指南

### 1. 问题选择策略

| 用户状态 | 推荐策略 | 问题示例 |
|----------|----------|----------|
| 记忆模糊 | 策略提示 → 情境重建 | SC-001, SC-002 |
| 细节缺失 | 来源监控 → 情境确认 | SM-001, SM-003 |
| 信心不足 | 信心评估 → 策略提示 | CA-001 → SC-001 |
| 叙事碎片化 | 意义反思 → 身份连接 | MR-001, MR-003 |
| 情感丰富 | 策略提示 → 情感连接 | SC-003 |

### 2. 问题顺序建议

```
初始阶段：CA-001 (信心评估) → 了解记忆清晰度
          ↓
提取阶段：SC-001/SC-002 (策略提示) → 引导情境重建
          ↓
深化阶段：SM-001/SM-003 (来源监控) → 验证记忆来源
          ↓
整合阶段：MR-001/MR-003 (意义反思) → 连接人生主题
```

### 3. A/B 测试设计

| 组别 | 干预 | 预期效果 |
|------|------|----------|
| A 组 (对照组) | 标准叙事引导问题 | 基线叙事质量 |
| B 组 (实验组) | 标准问题 + 元记忆提示 | 叙事细节 +20-30%，记忆信心 +1.5-2.0 分 |

**测量指标**:
- 叙事细节数量 (事件分段数、感官细节数)
- 记忆信心评分 (1-10 分)
- 叙事连贯性评分 (L0 系统)
- 用户满意度 (1-5 分)

### 4. 代码集成建议

```python
# 在叙事引导系统中添加元记忆策略选择器
def select_metamemory_prompt(user_state, memory_segment):
    if user_state.confidence < 5:
        return get_prompt("CA-001")  # 先评估信心
    elif memory_segment.details < 3:
        return get_prompt("SC-001")  # 情境重建
    elif memory_segment.source_unclear:
        return get_prompt("SM-001")  # 来源监控
    else:
        return get_prompt("MR-001")  # 意义反思
```

