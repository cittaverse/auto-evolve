# Citta-Hand Manifest
name = "narrative_trainer"
version = "1.0.0"
description = "Autonomous agent that trains narrative elicitation prompts overnight."

[schedule]
# Runs every night at 2:00 AM UTC
cron = "0 2 * * *"
timeout_sec = 1800

[dependencies]
tools_required = ["openclaw llm", "python3"]

[metrics]
track = ["overall_coherence", "temporal_consistency", "causal_density"]

[guardrails]
max_daily_budget_usd = 1.0
abort_on_repeated_failure = true
